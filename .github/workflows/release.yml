name: Build and Release

# Builds the app on a macOS runner and attaches a .zip and .dmg to the GitHub
# Release whenever a version tag (v*) is pushed. Also runnable manually.

# Bypasses the Homebrew untrusted tap warning on GitHub's macOS runners
env:
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

on:
  push:
    branches:
      - main # Or 'master', depending on what your default branch is named
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write   # required to create/update the Release and upload assets

jobs:
  build:
    name: Build & release (macOS)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The Liquid Glass `.icon` needs the Xcode 26 toolchain (actool) to compile.
      # `latest-stable` selects the newest stable Xcode on the runner image.
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Unsigned build: CI has no Developer ID. The alpha .app is ad-hoc/unsigned,
      # so users open it via right-click → Open (Gatekeeper will warn — expected).
      - name: Build (Release, unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project PaceTimer.xcodeproj \
            -scheme PaceTimer \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package .zip and .dmg
        run: |
          set -euo pipefail
          APP="build/Build/Products/Release/PeaceTimer.app"
          test -d "$APP" || { echo "::error::App not found at $APP"; ls -R build/Build/Products || true; exit 1; }
          VER="${GITHUB_REF_NAME}"
          # ditto preserves macOS metadata better than zip.
          ditto -c -k --keepParent "$APP" "PeaceTimer-${VER}.zip"
          # Compressed read-only disk image.
          hdiutil create -volname "PeaceTimer" -srcfolder "$APP" -ov -format UDZO "PeaceTimer-${VER}.dmg"
          ls -la PeaceTimer-*

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # NEW: If it's a tag, use the tag. If not, use 'continuous'
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'continuous' }}
          
          # NEW: Name it 'v1.0' or 'Latest Build' depending on how you pushed
          name: "PeaceTimer ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest Build' }}"
          
          # NEW: Only mark as prerelease if it's a normal push to main
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            PeaceTimer-*.zip
            PeaceTimer-*.dmg
