<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="PeaceTimer app icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7FC6FF"/>
      <stop offset="0.55" stop-color="#4E9BFF"/>
      <stop offset="1" stop-color="#6A5BFF"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.26" r="0.7">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.32"/>
      <stop offset="0.62" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dial" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#BBE2FF"/>
      <stop offset="0.5" stop-color="#63BCFF"/>
      <stop offset="1" stop-color="#8C73FF"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="54" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="54" fill="url(#sheen)"/>

  <!-- Timer dial -->
  <circle cx="128" cy="128" r="85" fill="none" stroke="url(#dial)" stroke-width="12" stroke-opacity="0.65"/>
  <circle cx="128" cy="128" r="91" fill="none" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="1"/>
  <!-- Countdown progress arc (~70%) -->
  <circle cx="128" cy="128" r="85" fill="none" stroke="#FFFFFF" stroke-width="12"
          stroke-linecap="round" stroke-opacity="0.95"
          stroke-dasharray="374 160" transform="rotate(-90 128 128)"/>
  <!-- Terminal prompt  >_ -->
  <polyline points="100,113 127,128 100,143" fill="none" stroke="#FFFFFF"
            stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="132" y="137" width="26" height="10" rx="5" fill="#FFFFFF"/>

  <rect x="8" y="8" width="240" height="240" rx="54" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="1"/>
</svg>
