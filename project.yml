# XcodeGen spec. Generate the project with:  xcodegen generate
# (brew install xcodegen)  — or just drag Sources/ + Resources/ into a new
# "macOS App" target in Xcode and set the build settings below by hand.

name: PaceTimer
options:
  bundleIdPrefix: com.robyrew
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_NAME: PeaceTimer
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: PaceTimer.entitlements
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  PaceTimer:
    type: application
    platform: macOS
    sources:
      - Sources
      - Assets.xcassets        # contains AppIcon.icon (native Liquid Glass icon)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robyrew.peacetimer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    # Generates a shared "PaceTimer" scheme so `xcodebuild -scheme PaceTimer` works.
    scheme:
      testTargets: []
